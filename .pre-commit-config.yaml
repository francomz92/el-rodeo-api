repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.13
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [python]
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
        types_or: [python]
        args: [--config=ruff.toml]
